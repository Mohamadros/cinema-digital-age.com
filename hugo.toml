baseURL = "https://example.org/"
locale = "en-US"
title = "Cinema in the Digital Age"
enableRobotsTXT = true

[params]
  description = "Discover films through emotion, explore upcoming releases, and join a living conversation about cinema culture in the digital age."
  author = "Your Name"
  university = "Your University"
  heroImage = "/images/hero-red-curtain.jpg"
  accentColor = "#d4af37"
  # Add a TMDB API Read Access Token here. For a production site, prefer a
